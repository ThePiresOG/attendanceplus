<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Presença · Espresso English</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4D6B5A">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AttendancePlus">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-escuro:#5A7568;
    --verde-medio:#A3A9AC;
    --azul-claro:#BECCCF;
    --salmao:#DB776B;
    --salmao-claro:#EBAF9F;
    --perola:#F5F4F0;
    --branco:#FFFFFF;
    --carvao:#2B2E2C;
    --linha:#E4E1DA;
    --excluir:#C1503D;
    --sombra:0 8px 20px rgba(43,46,44,0.08);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--perola); color:var(--carvao); font-family:'Poppins',sans-serif; -webkit-tap-highlight-color:transparent; }
  .app{ max-width:460px; margin:0 auto; min-height:100vh; background:var(--branco); display:flex; flex-direction:column; box-shadow:var(--sombra); }

  /* LOGIN */
  .login-screen{ flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:32px 28px; background:var(--verde-escuro); color:var(--branco); min-height:100vh; }
  .login-logo{ width:130px; height:auto; margin-bottom:6px; }
  .login-titulo{ font-size:22px; font-weight:600; text-align:center; margin:0 0 28px; }
  .login-form{ width:100%; }
  .login-field{ margin-bottom:16px; display:flex; flex-direction:column; gap:6px; }
  .login-field label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--salmao-claro); font-weight:600; }
  .login-field select, .login-field input{ font-family:'Poppins',sans-serif; font-size:15px; padding:13px 14px; border-radius:12px; border:none; background:rgba(255,255,255,0.12); color:var(--branco); width:100%; }
  .login-field select option{ color:var(--carvao); }
  .login-field input::placeholder{ color:rgba(255,255,255,0.5); }
  .login-field select:focus, .login-field input:focus{ outline:2px solid var(--salmao-claro); }
  .btn-entrar{ margin-top:8px; padding:14px; border-radius:12px; border:none; background:var(--salmao); color:var(--branco); font-family:'Poppins',sans-serif; font-weight:600; font-size:15px; cursor:pointer; width:100%; }
  .login-erro{ margin-top:10px; font-size:12.5px; color:#FFD6CC; text-align:center; min-height:16px; }
  .login-nota{ margin-top:24px; font-size:11px; text-align:center; color:rgba(255,255,255,0.5); font-style:italic; font-family:'Lora',serif; }

  /* HEADER */
  header{ background:var(--verde-escuro); color:var(--branco); padding:16px 20px 18px; position:relative; overflow:hidden; display:flex; align-items:center; gap:12px; }
  header::after{ content:""; position:absolute; right:-30px; top:-30px; width:120px;height:120px; border-radius:50%; background:rgba(255,255,255,0.06); }
  .header-logo{ width:52px; height:auto; flex-shrink:0; z-index:1; }
  .header-textos{ flex:1; z-index:1; }
  .top-row{ display:flex; justify-content:space-between; align-items:flex-start; }
  h1{ margin:0; font-size:19px; font-weight:600; letter-spacing:-0.01em; }
  .sair{ background:rgba(255,255,255,0.12); border:none; color:var(--branco); font-size:11.5px; padding:7px 12px; border-radius:20px; cursor:pointer; font-family:'Poppins',sans-serif; }
  .sub{ margin:3px 0 0; font-size:12.5px; color:rgba(255,255,255,0.75); }

  /* CONTROLS */
  .controls{ padding:18px 20px 6px; display:flex; gap:10px; }
  .field{ flex:1; display:flex; flex-direction:column; gap:6px; }
  label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--verde-escuro); font-weight:600; }
  select, input[type=date]{ font-family:'Poppins',sans-serif; font-size:13.5px; padding:10px 12px; border-radius:10px; border:1.5px solid var(--linha); background:var(--perola); color:var(--carvao); appearance:none; }
  select:focus, input:focus{ outline:2px solid var(--salmao); outline-offset:1px; }
  .prof-tag{ margin:12px 20px 0; font-size:12.5px; color:var(--verde-escuro); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .prof-tag b{ color:var(--carvao); }
  .badge{ font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px; background:var(--azul-claro); color:var(--verde-escuro); }

  /* LISTA com scroll */
  .lista{ flex:1; padding:14px 10px 10px 16px; margin-right:6px; display:flex; flex-direction:column; gap:10px; max-height:340px; overflow-y:auto; }
  .lista::-webkit-scrollbar{ width:6px; }
  .lista::-webkit-scrollbar-track{ background:var(--perola); border-radius:10px; }
  .lista::-webkit-scrollbar-thumb{ background:var(--azul-claro); border-radius:10px; }

  .aluno-wrap{ position:relative; border-radius:14px; overflow:hidden; flex-shrink:0; }
  .aluno-bg{ position:absolute; inset:0; display:flex; align-items:center; font-weight:600; font-size:13px; padding:0 18px; color:var(--branco); opacity:0; transition:opacity .1s ease; }
  .aluno-bg.editar{ background:var(--verde-escuro); justify-content:flex-start; }
  .aluno-bg.excluir{ background:var(--excluir); justify-content:flex-end; }
  .aluno{ position:relative; display:flex; align-items:center; justify-content:space-between; background:var(--perola); border:1.5px solid var(--linha); border-radius:14px; padding:12px 14px; touch-action:pan-y; user-select:none; }
  .aluno.marcado{ border-color:var(--azul-claro); }
  .nome{ font-size:14.5px; font-weight:500; }
  .editar-input{ font-family:'Poppins',sans-serif; font-size:14.5px; font-weight:500; border:none; background:transparent; color:var(--carvao); width:100%; padding:0; }
  .editar-input:focus{ outline:none; }
  .botoes{ display:flex; gap:8px; flex-shrink:0; margin-left:10px; }
  .stamp{ width:38px;height:38px; border-radius:50%; border:2px solid var(--linha); background:var(--branco); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:var(--linha); cursor:pointer; transition:transform .12s ease, box-shadow .12s ease; }
  .stamp:active{ transform:scale(0.9); }
  .stamp.p-on{ background:var(--salmao); border-color:var(--salmao); color:var(--branco); transform:rotate(-6deg); box-shadow:0 3px 8px rgba(219,119,107,0.4); }
  .stamp.f-on{ background:var(--verde-escuro); border-color:var(--verde-escuro); color:var(--branco); transform:rotate(6deg); box-shadow:0 3px 8px rgba(90,117,104,0.35); }

  .slot-vazio{ display:flex; align-items:center; gap:10px; border:1.5px dashed var(--azul-claro); border-radius:14px; padding:12px 14px; color:var(--verde-escuro); font-size:13px; cursor:pointer; background:transparent; flex-shrink:0; }
  .slot-vazio .mais{ width:26px;height:26px; border-radius:50%; border:1.5px dashed var(--azul-claro); display:flex;align-items:center;justify-content:center; font-size:16px; flex-shrink:0; }
  .slot-vazio input{ border:none; background:transparent; font-family:'Poppins',sans-serif; font-size:13.5px; width:100%; color:var(--carvao); }
  .slot-vazio input:focus{ outline:none; }

  .dica-swipe{ margin:10px 20px 0; font-size:11px; color:#9a9a94; display:flex; gap:14px; }

  .resumo{ display:flex; gap:10px; padding:8px 20px 4px; font-size:12.5px; color:var(--verde-escuro); }
  .resumo span b{ color:var(--carvao); }
  footer{ padding:14px 20px 20px; display:flex; gap:10px; border-top:1px solid var(--linha); margin-top:8px; }
  button.acao{ flex:1; padding:13px; border-radius:12px; border:none; font-family:'Poppins',sans-serif; font-weight:600; font-size:14px; cursor:pointer; }
  .salvar{ background:var(--verde-escuro); color:var(--branco); }
  .exportar{ background:var(--branco); color:var(--verde-escuro); border:1.5px solid var(--verde-escuro) !important; }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--carvao); color:var(--branco); padding:10px 18px; border-radius:30px; font-size:13px; opacity:0; transition:all .25s ease; pointer-events:none; z-index:30; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .nota{ margin:10px 20px 0; font-size:11.5px; color:#9a9a94; font-style:italic; font-family:'Lora',serif; }
  .hidden{ display:none !important; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(43,46,44,0.5); display:flex; align-items:center; justify-content:center; z-index:40; padding:24px; }
  .modal-caixa{ background:var(--branco); border-radius:16px; padding:22px; max-width:320px; width:100%; }
  .modal-titulo{ margin:0 0 6px; font-weight:600; font-size:16px; color:var(--carvao); }
  .modal-texto{ margin:0 0 18px; font-size:13.5px; color:var(--carvao); line-height:1.4; }
  .modal-botoes{ display:flex; gap:10px; }
  .modal-botoes button{ flex:1; padding:11px; border-radius:10px; border:none; font-family:'Poppins',sans-serif; font-weight:600; font-size:13.5px; cursor:pointer; }
  .modal-cancelar{ background:var(--perola); color:var(--carvao); }
  .modal-confirmar{ background:var(--excluir); color:var(--branco); }
</style>
</head>

    </header>

    <div class="controls">
      <div class="field">
        <label for="turma">Turma</label>
        <select id="turma"></select>
      </div>
      <div class="field">
        <label for="data">Data</label>
        <input type="date" id="data">
      </div>

    <p class="prof-tag">Professor(a): <b id="profNome"></b> <span class="badge" id="badgeModalidade"></span></p>

      <span>Presentes: <b id="qtdPresente">0</b></span>
      <span>Faltas: <b id="qtdFalta">0</b></span>

    <footer>
      <button class="acao salvar" id="btnSalvar">Salvar presença</button>
      <button class="acao exportar" id="btnExportar">Exportar CSV</button>

</div>

<div class="toast" id="toast"></div>

<script>
const PROFESSORES = ["Guilherme","Amanda","Felipe","Lídia"];
const API_URL = "https://script.google.com/macros/s/AKfycbzfE-xbQXShs1ClnjyazisNQFICU_w0ThLktIIurSN1_Fa_RGM2DzClxU9Kft884zHc/exec";

let TURMAS = [];

async function chamarAPI(payload){
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function buscarTurmas(professor){
  const res = await fetch(`${API_URL}?professor=${encodeURIComponent(professor)}`);
  const dados = await res.json();
  return dados.map(t => ({
    id: 't' + t.linha,
    linha: t.linha,
    nivel: t.nivel,
    turmaId: t.turmaId,
    professor: t.professor,
    modalidade: t.modalidade,
    dias: String(t.dias).split('/'),
    horario: formatarHorario(t.horario),
    alunos: t.alunos || []
  }));
}

function formatarHorario(h){
  if(typeof h === 'string' && h.includes('T') && h.includes('Z')){
    const d = new Date(h);
    const hh = String(d.getUTCHours()).padStart(2,'0');
    const mm = String(d.getUTCMinutes()).padStart(2,'0');
    return `${hh}h${mm}`;
  }
  return h;
}

const MAX_SLOTS = 6;
const sessao = {};
let professorLogado = null;

const $loginProfessor = document.getElementById('loginProfessor');
const $loginSenha = document.getElementById('loginSenha');
const $btnEntrar = document.getElementById('btnEntrar');
const $loginErro = document.getElementById('loginErro');
const $telaLogin = document.getElementById('telaLogin');
const $telaApp = document.getElementById('telaApp');
const $btnSair = document.getElementById('btnSair');

const $turma = document.getElementById('turma');
const $data = document.getElementById('data');
const $lista = document.getElementById('lista');
const $profNome = document.getElementById('profNome');
const $badgeModalidade = document.getElementById('badgeModalidade');
const $dataResumo = document.getElementById('dataResumo');
const $qtdP = document.getElementById('qtdPresente');
const $qtdF = document.getElementById('qtdFalta');
const $qtdPend = document.getElementById('qtdPendente');
const $toast = document.getElementById('toast');

function hojeISO(){ return new Date().toISOString().slice(0,10); }

function popularLoginProfessores(){
  PROFESSORES.forEach(nome=>{
    const opt = document.createElement('option');
    opt.value = nome; opt.textContent = nome;
    $loginProfessor.appendChild(opt);
  });
}

function popularTurmas(){
  $turma.innerHTML = '';
  TURMAS.forEach(t=>{
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.nivel} · ${t.dias.join('/')} · ${t.horario}`;
    $turma.appendChild(opt);
  });
}

function turmaAtual(){ return TURMAS.find(t=>t.id===$turma.value); }

function chaveSessao(){
  const t = turmaAtual();
  if(!sessao[t.id]) sessao[t.id] = {};
  if(!sessao[t.id][$data.value]) sessao[t.id][$data.value] = {};
  return sessao[t.id][$data.value];
}

function renderLista(){
  const t = turmaAtual();
  $profNome.textContent = t.professor;
  $badgeModalidade.textContent = t.modalidade;
  $lista.innerHTML = '';

  t.alunos.forEach(nome=> $lista.appendChild(criarLinhaAluno(nome, t)));

  const vagas = Math.max(0, MAX_SLOTS - t.alunos.length);
  for(let i=0; i<vagas; i++){
    const slot = document.createElement('div');
    slot.className = 'slot-vazio';
    slot.innerHTML = `<span class="mais">+</span><span class="texto">Adicionar aluno (nome e sobrenome)</span>`;
    slot.addEventListener('click', ()=> ativarSlot(slot, t));
    $lista.appendChild(slot);
  }
  atualizarResumo();
}

function criarLinhaAluno(nome, t){
  const status = chaveSessao()[nome];
  const wrap = document.createElement('div');
  wrap.className = 'aluno-wrap';
  wrap.innerHTML = `
    <div class="aluno-bg editar">Editar</div>
    <div class="aluno-bg excluir">Excluir</div>
    <div class="aluno ${status ? 'marcado' : ''}">
      <span class="nome">${nome}</span>
      <div class="botoes">
        <div class="stamp p ${status==='P' ? 'p-on' : ''}" title="Presente">P</div>
        <div class="stamp f ${status==='F' ? 'f-on' : ''}" title="Falta">F</div>
      </div>
    </div>`;
  const row = wrap.querySelector('.aluno');
  const [pBtn, fBtn] = row.querySelectorAll('.stamp');
  pBtn.addEventListener('click', ()=>{ if(!row.dataset.dragged) marcar(nome,'P'); });
  fBtn.addEventListener('click', ()=>{ if(!row.dataset.dragged) marcar(nome,'F'); });
  attachSwipe(row, wrap, nome, t);
  return wrap;
}

function attachSwipe(row, wrap, nome, t){
  let startX = 0, deltaX = 0, dragging = false, moved = false;
  const bgEditar = wrap.querySelector('.editar');
  const bgExcluir = wrap.querySelector('.excluir');

  row.addEventListener('pointerdown', e=>{
    startX = e.clientX; deltaX = 0; dragging = true; moved = false;
    row.style.transition = 'none';
  });
  row.addEventListener('pointermove', e=>{
    if(!dragging) return;
    deltaX = e.clientX - startX;
    if(Math.abs(deltaX) > 8) moved = true;
    if(!moved) return;
    row.style.transform = `translateX(${deltaX}px)`;
    bgEditar.style.opacity = deltaX > 20 ? 1 : 0;
    bgExcluir.style.opacity = deltaX < -20 ? 1 : 0;
  });
  function finalizar(){
    if(!dragging) return;
    dragging = false;
    row.style.transition = 'transform .2s ease';
    row.style.transform = 'translateX(0)';
    bgEditar.style.opacity = 0;
    bgExcluir.style.opacity = 0;
    if(moved){
      row.dataset.dragged = '1';
      setTimeout(()=> delete row.dataset.dragged, 60);
    }
    if(deltaX < -80){ confirmarExclusao(nome, t); }
    else if(deltaX > 80){ ativarEdicao(row, nome, t); }
    deltaX = 0;
  }
  row.addEventListener('pointerup', finalizar);
  row.addEventListener('pointercancel', finalizar);
  row.addEventListener('pointerleave', ()=>{ if(dragging) finalizar(); });
}

function ativarEdicao(row, nomeAntigo, t){
  const nomeSpan = row.querySelector('.nome');
  nomeSpan.outerHTML = `<input type="text" class="editar-input" value="${nomeAntigo}">`;
  const input = row.querySelector('.editar-input');
  input.focus(); input.select();
  function salvar(){
    const novoNome = input.value.trim();
    if(novoNome && novoNome !== nomeAntigo){
      const idx = t.alunos.indexOf(nomeAntigo);
      if(idx > -1) t.alunos[idx] = novoNome;
      const marcados = chaveSessao();
      if(marcados[nomeAntigo] !== undefined){
        marcados[novoNome] = marcados[nomeAntigo];
        delete marcados[nomeAntigo];
      }
      mostrarToast('Nome atualizado');
    }
    renderLista();
  }
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') salvar(); });
  input.addEventListener('blur', salvar);
}

function confirmarExclusao(nome, t){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-caixa">
      <p class="modal-titulo">Remover aluno</p>
      <p class="modal-texto">Tem certeza que quer remover <b>${nome}</b> desta turma? O historico de presenca ja salvo nao e apagado.</p>
      <div class="modal-botoes">
        <button class="modal-cancelar">Cancelar</button>
        <button class="modal-confirmar">Remover</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-cancelar').addEventListener('click', ()=> overlay.remove());
  overlay.querySelector('.modal-confirmar').addEventListener('click', ()=>{
    t.alunos = t.alunos.filter(n=> n!==nome);
    delete chaveSessao()[nome];
    overlay.remove();
    renderLista();
    mostrarToast('Aluno removido da turma');
  });
}

function ativarSlot(slot, t){
  slot.innerHTML = `<span class="mais">+</span><input type="text" placeholder="Nome e sobrenome" autofocus>`;
  const input = slot.querySelector('input');
  input.focus();
  let salvando = false;
  async function confirmar(){
    const nome = input.value.trim();
    if(!nome || salvando){ renderLista(); return; }
    salvando = true;
    try{
      const resultado = await chamarAPI({ acao:'adicionarAluno', linha: t.linha, nome });
      if(resultado.sucesso){ t.alunos.push(nome); mostrarToast('Aluno adicionado'); }
      else mostrarToast('Erro: ' + (resultado.erro || 'não deu pra adicionar'));
    } catch(err){
      mostrarToast('Erro de conexão ao adicionar aluno');
    }
    renderLista();
  }
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') confirmar(); });
  input.addEventListener('blur', confirmar);
}

function marcar(nome, status){
  const marcados = chaveSessao();
  marcados[nome] = (marcados[nome] === status) ? undefined : status;
  if(marcados[nome] === undefined) delete marcados[nome];
  renderLista();
}

function atualizarResumo(){
  const t = turmaAtual();
  const marcados = chaveSessao();
  let p=0, f=0;
  Object.values(marcados).forEach(s=> s==='P' ? p++ : f++);
  $qtdP.textContent = p; $qtdF.textContent = f;
  $qtdPend.textContent = MAX_SLOTS - t.alunos.length;
  const dataFmt = new Date($data.value + 'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long'});
  $dataResumo.textContent = `${dataFmt} · Turma ${t.turmaId} · ${t.dias.join('/')} ${t.horario}`;
}

function mostrarToast(msg){
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(()=> $toast.classList.remove('show'), 1800);
}

document.getElementById('btnSalvar').addEventListener('click', async ()=>{
  const t = turmaAtual();
  const marcados = chaveSessao();
  const nomes = Object.keys(marcados);
  if(nomes.length === 0){ mostrarToast('Marque ao menos um aluno antes de salvar'); return; }
  const registros = nomes.map(nome => ({
    turmaId: t.turmaId, nivel: t.nivel, professor: t.professor, data: $data.value, aluno: nome, status: marcados[nome]
  }));
  mostrarToast('Salvando...');
  try{
    const resultado = await chamarAPI({ acao:'salvarPresenca', registros, duracao: t.duracao || 1 });
    if(resultado.sucesso) mostrarToast('Presença salva para turma ' + t.turmaId);
    else mostrarToast('Erro ao salvar: ' + (resultado.erro || 'tenta de novo'));
  } catch(err){
    mostrarToast('Erro de conexão ao salvar');
  }
});

document.getElementById('btnExportar').addEventListener('click', ()=>{
  const linhas = [['Turma','Nivel','Professor','Data','Aluno','Status']];
  Object.entries(sessao).forEach(([turmaId, datas])=>{
    const t = TURMAS.find(x=>x.id===turmaId);
    Object.entries(datas).forEach(([data, alunos])=>{
      Object.entries(alunos).forEach(([nome, status])=>{
        linhas.push([t.turmaId, t.nivel, t.professor, data, nome, status==='P' ? 'Presente' : 'Falta']);
      });
    });
  });
  if(linhas.length === 1){ mostrarToast('Marque ao menos um aluno antes de exportar'); return; }
  const csv = linhas.map(l=> l.map(c=>`"${c}"`).join(';')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'presenca_espresso_english.csv'; a.click();
  URL.revokeObjectURL(url);
  mostrarToast('CSV exportado');
});

$turma.addEventListener('change', renderLista);
$data.addEventListener('change', renderLista);

$btnEntrar.addEventListener('click', async ()=>{
  const nome = $loginProfessor.value;
  const senha = $loginSenha.value;
  $btnEntrar.disabled = true;
  $btnEntrar.textContent = 'Entrando...';
  $loginErro.textContent = '';
  try{
    const login = await chamarAPI({ acao:'login', professor: nome, senha });
    if(!login.sucesso){
      $loginErro.textContent = login.erro || 'Não foi possível entrar.';
      return;
    }
    TURMAS = await buscarTurmas(nome);
    if(TURMAS.length === 0){
      $loginErro.textContent = 'Login certo, mas nenhuma turma encontrada pra esse professor.';
      return;
    }
    professorLogado = nome;
    $telaLogin.classList.add('hidden');
    $telaApp.classList.remove('hidden');
    popularTurmas();
    $data.value = hojeISO();
    renderLista();
  } catch(err){
    console.error('Erro no login:', err);
    $loginErro.textContent = 'Erro de conexão: ' + err.message;
  } finally {
    $btnEntrar.disabled = false;
    $btnEntrar.textContent = 'Entrar';
  }
});

$btnSair.addEventListener('click', ()=>{
  professorLogado = null;
  $loginSenha.value = '';
  $telaApp.classList.add('hidden');
  $telaLogin.classList.remove('hidden');
});

popularLoginProfessores();
</script>
